<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Raise a Complaint - Private Community</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f1c6be, #e9aac4d6);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      width: 420px;
      max-width: 95%;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      padding: 30px;
    }

    .title {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 20px;
    }

    select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .problem-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .problem {
      padding: 12px;
      border-radius: 12px;
      background: linear-gradient(135deg, #74ebd5, #acb6e5);
      color: #2c3e50;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
    }

    .problem.selected {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    .submit-btn, .back-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .submit-btn {
      background: linear-gradient(135deg, #36d1dc, #5b86e5);
      color: #fff;
    }

    .back-btn {
      background: #ddd;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="title">🛠 Raise a Complaint</div>

  <button class="back-btn" onclick="goBack()"><a href="dashboardpage.html">⬅ Back To Dashboard</a></button>

  <!-- ✅ SELECT FLAT NUMBER -->
  <select id="flatSelect">
    <option value="">🏠 Select Flat Number</option>
    <option value="Flat-101">Flat-101</option>
    <option value="Flat-102">Flat-102</option>
    <option value="Flat-103">Flat-103</option>
    <option value="Flat-104">Flat-104</option>
  </select>

  <div class="problem-list">
    <div class="problem" onclick="selectProblem(this)">💧 Water Leakage</div>
    <div class="problem" onclick="selectProblem(this)">⚡ Power Issue</div>
    <div class="problem" onclick="selectProblem(this)">🚿 No Water Supply</div>
    <div class="problem" onclick="selectProblem(this)">🪠 Bathroom Issue</div>
    <div class="problem" onclick="selectProblem(this)">🧹 Cleaning</div>
    <div class="problem" onclick="selectProblem(this)">🛗 Lift Not Working</div>
  </div>

  <textarea id="description" rows="4" placeholder="Describe your problem..."></textarea>

  <button class="submit-btn" onclick="submitComplaint()">📩 Submit Complaint</button>
</div>

<script>
  const currentUser = localStorage.getItem("currentUser");
  let selectedProblem = "";

  function selectProblem(el) {
    document.querySelectorAll('.problem').forEach(p => p.classList.remove('selected'));
    el.classList.add('selected');
    selectedProblem = el.innerText;
  }

  function goBack() {
    window.history.back();
  }

  async function submitComplaint() {
    const description = document.getElementById("description").value.trim();
    const flat = document.getElementById("flatSelect").value;

    if (!flat || !selectedProblem || !description) {
      alert("Please select flat, problem, and description");
      return;
    }

    const complaint = {
      type: selectedProblem,
      description,
      status: "Pending",
      flat,                         // ✅ SELECTED FLAT
      date: new Date().toLocaleString()
    };

    try {
      await fetch("http://localhost:3000/api/complaints", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(complaint)
      });

      alert("✅ Complaint submitted successfully!");
      window.location.href = "complaint-received.html";

    } catch (err) {
      alert("❌ Backend error. Check server.");
      console.error(err);
    }
  }
</script>

</body>
</html>
