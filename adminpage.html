<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Complaints</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1100px;
      margin: auto;
      margin-bottom: 20px;
    }

    .refresh-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      background: linear-gradient(135deg, #43cea2, #185a9d);
      color: #fff;
      cursor: pointer;
    }

    .complaints-container {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .complaint-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
    }

    .Pending { background: #f39c12; }
    .InProgress { background: #3498db; }
    .Resolved { background: #2ecc71; }

    .message-box {
      max-width:1100px;
      margin:20px auto;
      background:#fff;
      padding:20px;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.25);
    }

    input, textarea {
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #ccc;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

  <button onclick="resolveComplaint('${c._id}')">
  Resolve
</button>
  <div class="top-bar">
    <h1>👨‍💼 Admin Panel - All Complaints</h1>
    <button class="refresh-btn" onclick="loadComplaints()">🔄 Refresh</button>
  </div>

  <!-- ================= SEND MESSAGE BOX ================= -->
  <div class="message-box">
    <h2>📨 Send Message to Member</h2>

    <input id="memberName" type="text" placeholder="Enter Member Flat No">
    <textarea id="adminMessage" rows="3" placeholder="Type your message here..."></textarea>

    <button class="refresh-btn" onclick="sendAdminMessage()">🚀 Send Message</button>
  </div>

  <!-- ================= COMPLAINTS ================= -->
  <div class="complaints-container" id="complaintsContainer"></div>

  
  <script>
    // ================= LOAD COMPLAINTS =================
    async function loadComplaints() {
      const res = await fetch("http://localhost:3000/api/complaints");
      const complaints = await res.json();

      const container = document.getElementById("complaintsContainer");
      container.innerHTML = "";

      if (complaints.length === 0) {
        container.innerHTML = "<p style='color:white;text-align:center;'>No complaints yet.</p>";
        return;
      }

      complaints.forEach(c => {
        const card = document.createElement("div");
        card.className = "complaint-card";

        card.innerHTML = `
          <div><b>Type:</b> ${c.type}</div>
          <div><b>Description:</b> ${c.description}</div>
          <div><b>Date:</b> ${c.date}</div>
          <div><b>Flat:</b> ${c.flat}</div>

          <div class="status-row" style="margin-top:10px;">
            <div class="status-badge ${c.status.replace(" ", "")}">
              ${c.status}
            </div>

            <select onchange="updateStatus('${c._id}', '${c.flat}', this.value)">
              <option ${c.status==="Pending"?"selected":""}>Pending</option>
              <option ${c.status==="In Progress"?"selected":""}>In Progress</option>
              <option ${c.status==="Resolved"?"selected":""}>Resolved</option>
            </select>
          </div>
        `;

        container.appendChild(card);
      });
    }

    // ================= UPDATE STATUS + AUTO MESSAGE =================
    async function updateStatus(id, flat, newStatus) {
      await fetch(`http://localhost:3000/api/complaints/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: newStatus })
      });

      if (newStatus === "Resolved") {
        await fetch("http://localhost:3000/api/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            to: flat,
            from: "Admin",
            message: "✅ Your complaint has been resolved. Thank you!",
            date: new Date().toLocaleString()
          })
        });
      }

      loadComplaints();
    }

    // ================= SEND MANUAL ADMIN MESSAGE =================
    async function sendAdminMessage() {
      const to = document.getElementById("memberName").value.trim();
      const message = document.getElementById("adminMessage").value.trim();

      if (!to || !message) {
        alert("Enter member flat and message");
        return;
      }

      await fetch("http://localhost:3000/api/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          to,
          from: "Admin",
          message,
          date: new Date().toLocaleString()
        })
      });

      alert("✅ Message sent!");
      document.getElementById("adminMessage").value = "";
    }

    // Load on page start
    loadComplaints();

  
  </script>

</body>
</html>

  
  </script>

</body>
</html>
